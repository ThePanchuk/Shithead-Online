# ──────────────────────────────────────────────────────────────────────────
#  Deploy STATIC files only to IONOS Webhosting (shared hosting) via SFTP.
#
#  Use this if you have an IONOS *Webhosting* / *Linux Hosting* package
#  (no Node.js runtime). Only the bots-only single-player mode will work
#  — Socket.io multiplayer requires Node.js so the server must be hosted
#  elsewhere (see the multiplayer notes at the bottom).
#
#  Required GitHub repo secrets:
#    FTP_HOST     — IONOS SFTP hostname, e.g. access-XXXXXXXXXX.webspace-host.com
#    FTP_USER     — your IONOS SFTP user
#    FTP_PASSWORD — your IONOS SFTP password
#    FTP_DIR      — remote target dir, e.g.  /shithead/   or  /
#
#  Find these in the IONOS Control Panel → Hosting → SFTP/SSH access.
#
#  ── Multiplayer note ─────────────────────────────────────────────────────
#  Socket.io multiplayer cannot run on shared webhosting (no Node runtime).
#  Two options if you still want multiplayer:
#    (a) Host server.js elsewhere — Render.com, Fly.io, Railway, or an
#        IONOS VPS — and change the Socket.io URL in public/app.js from
#        `io()` to `io("https://your-node-host.example.com")`.
#    (b) Drop multiplayer and ship only the local bot mode by removing
#        the "🌐 Play Online" button and the socket.io script tag from
#        index.html.
# ──────────────────────────────────────────────────────────────────────────
name: Deploy static to IONOS Webhosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload public/ via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps         # IONOS supports FTPS; for SFTP use a different action
          local-dir: ./public/
          server-dir: dist/shithead/
          # Don't blow away unrelated files in the same webspace
          dangerous-clean-slate: false
